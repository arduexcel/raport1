<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لیستی هاتوچۆی ڕۆژانە</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .list-container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: #3498db; color: white; font-size: 16px; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .time-tag { color: #7f8c8d; font-size: 13px; }
        .car-num { font-weight: bold; font-size: 18px; color: #2c3e50; }
        .line-name { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

<div class="list-container">
    <h2>لیستی گەشتەکانی ئەمڕۆ</h2>
    <table>
        <thead>
            <tr>
                <th>کات</th>
                <th>ژمارەی ئۆتۆمبێل</th>
                <th>هێڵ</th>
                <th>ناوەی کارمەند</th>
            </tr>
        </thead>
        <tbody id="trip-table-body">
            </tbody>
    </table>
</div>

<script>
    // هەمان کۆنفیگی فایەربەیسەکەی خۆت لێرە دابنێوە
    const firebaseConfig = {
        apiKey: "AIzaSyCuUstd-6d0E-EbmQipv2mWk-bA55ajpQ0",
        authDomain: "car-system-4594d.firebaseapp.com",
        projectId: "car-system-4594d",
        storageBucket: "car-system-4594d.firebasestorage.app",
        messagingSenderId: "719030469585",
        appId: "1:719030469585:web:7a23645b9e684b727dd6f0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadTrips() {
        const today = new Date().toLocaleDateString('en-CA');
        const tbody = document.getElementById('trip-table-body');
        
        // وەرگرتنی وەسڵەکان
        const snap = await db.collection("Invoices")
                             .where("searchDate", "==", today)
                             .get();

        let trips = [];
        snap.forEach(doc => {
            const d = doc.data();
            // فلتەرکردنی پارکینگ - ئەگەر پارکینگ بوو پیشانی نادات
            if (!d.isParking) {
                trips.push(d);
            }
        });

        // ڕیزکردن بەپێی کات
        trips.sort((a, b) => b.timestamp - a.timestamp);

        tbody.innerHTML = "";
        trips.forEach(t => {
            tbody.innerHTML += `
                <tr>
                    <td class="time-tag">${t.date.split(',')[1] || t.date}</td>
                    <td class="car-num">${t.carNumber}</td>
                    <td class="line-name">${t.line}</td>
                    <td>${t.employee}</td>
                </tr>
            `;
        });
        
        if (trips.length === 0) {
            tbody.innerHTML = "<tr><td colspan='4'>هیچ گەشتێک بۆ ئەمڕۆ تۆمار نەکراوە</td></tr>";
        }
    }

    // هەموو 30 چرکەیەک لاپەڕەکە نوێ دەبێتەوە بۆ بینینی وەسڵە نوێیەکان
    loadTrips();
    setInterval(loadTrips, 30000);
</script>

</body>
</html>
