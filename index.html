<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لیستی گەشتە چالاکەکان</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; direction: rtl; }
        .list-container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: #3498db; color: white; font-size: 16px; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .time-tag { color: #7f8c8d; font-size: 13px; }
        .car-num { font-weight: bold; font-size: 18px; color: #2c3e50; }
        .line-name { color: #27ae60; font-weight: bold; }
        .empty-msg { padding: 40px; text-align: center; color: #7f8c8d; font-size: 18px; }
    </style>
</head>
<body>

<div class="list-container">
    <h2>لیستی گەشتەکانی ئەمڕۆ (تەنها چالاکەکان)</h2>
    <table>
        <thead>
            <tr>
                <th>کات</th>
                <th>ژمارەی ئۆتۆمبێل</th>
                <th>هێڵ</th>
                <th>ناوی کارمەند</th>
            </tr>
        </thead>
        <tbody id="trip-table-body">
            <tr><td colspan='4' class='empty-msg'>داتا بار دەکرێت...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAMI84_IuKUZVqc8ImMW7eahru20cTkjFM",
        authDomain: "sysam-k.firebaseapp.com",
        projectId: "sysam-k",
        storageBucket: "sysam-k.firebasestorage.app",
        messagingSenderId: "905972435434",
        appId: "1:905972435434:web:2501e11240523f8368ca93"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    let localTrips = [];

    function startListening() {
        const today = new Date().toLocaleDateString('en-CA');
        
        // گوێگرتن لە وەسڵەکان
        db.collection("Invoices").doc(today).collection("AllInvoices")
          .onSnapshot((snapshot) => {
              
              snapshot.docChanges().forEach((change) => {
                  const data = change.doc.data();
                  const id = change.doc.id;

                  if (change.type === "added") {
                      // پشکنین: تەنها ئەگەر سڕاوە نەبێت و پارکینگ نەبێت زیادی بکە
                      if (data.status !== "canceled" && data.line !== "پارکینگ") {
                          if (!localTrips.find(t => t.id === id)) {
                              localTrips.push({ id, ...data });
                          }
                      }
                  }
                  
                  if (change.type === "modified") {
                      const index = localTrips.findIndex(t => t.id === id);
                      // ئەگەر وەسڵەکە لە لیستەکەدا هەبوو و ئێستا کرا بە Canceled، لایبەرە
                      if (data.status === "canceled" || data.line === "پارکینگ") {
                          if (index !== -1) localTrips.splice(index, 1);
                      } else {
                          // ئەگەر دەستکاری کرا و هێشتا چالاک بوو، زانیارییەکان نوێ بکەرەوە
                          if (index !== -1) {
                              localTrips[index] = { id, ...data };
                          } else {
                              // ئەگەر پێشتر نەبوو (بۆ نموونە سڕاوە بوو و ئێستا کارا کرایەوە) زیادی بکە
                              localTrips.push({ id, ...data });
                          }
                      }
                  }

                  if (change.type === "removed") {
                      localTrips = localTrips.filter(t => t.id !== id);
                  }
              });

              renderTable();
          });
    }

    function renderTable() {
        const tbody = document.getElementById('trip-table-body');
        
        // ڕیزکردن: نوێترین گەشت لە سەرەوە بێت
        const sortedTrips = [...localTrips].sort((a, b) => {
            const timeA = a.timestamp?.seconds || 0;
            const timeB = b.timestamp?.seconds || 0;
            return timeB - timeA;
        });

        if (sortedTrips.length === 0) {
            tbody.innerHTML = "<tr><td colspan='4' class='empty-msg'>هیچ گەشتێکی چالاک بۆ ئەمڕۆ نییە</td></tr>";
            return;
        }

        tbody.innerHTML = "";
        sortedTrips.forEach(t => {
            const timeDisplay = t.date ? (t.date.includes(',') ? t.date.split(',')[1] : t.date) : "---";
            
            tbody.innerHTML += `
                <tr>
                    <td class="time-tag">${timeDisplay}</td>
                    <td class="car-num">${t.carNumber}</td>
                    <td class="line-name">${t.line}</td>
                    <td>${t.employee || "---"}</td>
                </tr>
            `;
        });
    }

    startListening();
</script>

</body>
</html>
